<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Header</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="scripts.js"></script>
</head>
<body class="headerBody" onload="onHeaderLoad();">
    <span id="searchBoxAndImages">
        <img id="dotnetLogo" src="content/icons/dotnet.png" width="38" height="38" role="presentation" />
        <input type="text"
               name="name"
               maxlength="260"
               id="search-box"
               value=""
               tabindex="1"
               aria-label="search"/>
        <a id="logoText" href="/" target="_top">Source&nbsp;Browser</a>
        <a id="paneToggle"
           href="#"
           role="button"
           onclick="toggleMobilePane(); return false;">Results</a>
        <span id="headerMenu">
            <a id="helpButtonLink" href="overview.html" target="s">
                Help
            </a>
        </span>
    </span>
</body>
</html>
