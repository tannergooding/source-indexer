<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Source Browser</title>
    <link rel="search" type="application/opensearchdescription+xml" href="opensearch" title="Source Browser">
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js"></script>
</head>
<body class="indexBody" onload="onPageLoaded();">
    <iframe name="h"
            id="h"
            class="headerFrame"
            src="header.html"
            scrolling="no"
            title="header"></iframe>
    <div class="paneContainer" id="splitter">
        <iframe name="n"
                id="n"
                class="navFrame"
                src="results.html"
                title="search-results"></iframe>
        <iframe name="s"
                id="s"
                class="contentFrame"
                src="overview.html"
                title="content"></iframe>
    </div>
</body>
</html>
